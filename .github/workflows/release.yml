name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-macos
            artifact: cot-aarch64-macos
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            artifact: cot-x86_64-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseFast

      - name: Compiler unit tests
        run: zig build test

      - name: Cot tests (native)
        if: matrix.os == 'macos-14'
        run: ./test/run_all.sh

      - name: Package
        run: |
          mkdir -p staging/bin staging/lib
          cp zig-out/bin/cot staging/bin/
          cp -r stdlib staging/lib/std
          cd staging && tar -czf ../${{ matrix.artifact }}.tar.gz .
          cd .. && shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Tag stdlib repo
        env:
          STD_REPO_TOKEN: ${{ secrets.STD_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd stdlib
          git tag "$TAG" 2>/dev/null || true
          git -c url."https://x-access-token:${STD_REPO_TOKEN}@github.com/".insteadOf="https://github.com/" \
            push origin "$TAG" 2>/dev/null || true

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cot-aarch64-macos.tar.gz
            cot-aarch64-macos.tar.gz.sha256
            cot-x86_64-linux.tar.gz
            cot-x86_64-linux.tar.gz.sha256
          generate_release_notes: true
