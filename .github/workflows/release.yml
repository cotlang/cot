name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-macos
            artifact: cot-aarch64-macos
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            artifact: cot-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            artifact: cot-aarch64-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseFast

      - name: Compiler unit tests
        run: zig build test

      - name: Cot tests (native)
        if: matrix.os == 'macos-14'
        run: ./test/run_all.sh

      - name: Package
        run: |
          mkdir -p staging/bin staging/lib
          cp zig-out/bin/cot staging/bin/
          cp -r stdlib staging/lib/std
          cd staging && tar -czf ../${{ matrix.artifact }}.tar.gz .
          cd .. && shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Tag stdlib repo
        env:
          STD_REPO_TOKEN: ${{ secrets.STD_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd stdlib
          git tag "$TAG" 2>/dev/null || true
          git -c url."https://x-access-token:${STD_REPO_TOKEN}@github.com/".insteadOf="https://github.com/" \
            push origin "$TAG" 2>/dev/null || true

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cot-aarch64-macos.tar.gz
            cot-aarch64-macos.tar.gz.sha256
            cot-x86_64-linux.tar.gz
            cot-x86_64-linux.tar.gz.sha256
            cot-aarch64-linux.tar.gz
            cot-aarch64-linux.tar.gz.sha256
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          MACOS_SHA=$(cat cot-aarch64-macos.tar.gz.sha256 | awk '{print $1}')
          LINUX_SHA=$(cat cot-x86_64-linux.tar.gz.sha256 | awk '{print $1}')
          LINUX_ARM_SHA=$(cat cot-aarch64-linux.tar.gz.sha256 | awk '{print $1}')

          cat > /tmp/cot.rb << EOF
          class Cot < Formula
            desc "Write like TypeScript, run like Rust, deploy anywhere"
            homepage "https://github.com/cotlang/cot"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/cotlang/cot/releases/download/v${VERSION}/cot-aarch64-macos.tar.gz"
                sha256 "${MACOS_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/cotlang/cot/releases/download/v${VERSION}/cot-x86_64-linux.tar.gz"
                sha256 "${LINUX_SHA}"
              end
              on_arm do
                url "https://github.com/cotlang/cot/releases/download/v${VERSION}/cot-aarch64-linux.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              end
            end

            def install
              bin.install "bin/cot"
              (lib/"cot").install "lib/std"
            end

            test do
              assert_match "cot #{version}", shell_output("#{bin}/cot version")
            end
          end
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/cot.rb

          git clone https://x-access-token:${TAP_TOKEN}@github.com/cotlang/homebrew-tap.git /tmp/tap
          cp /tmp/cot.rb /tmp/tap/Formula/cot.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cot.rb
          git commit -m "Update cot to ${VERSION}"
          git push
