# Cot Bytecode Format Specification
# Version: 0.1
# This file documents the binary format for compiled Cot modules (.cbo, .clb, .cbr)

[meta]
version = "0.1"
description = "Binary format for compiled Cot bytecode modules"
endianness = "little"

# =============================================================================
# File Types
# =============================================================================

[file_types]
description = "Cot supports three compiled file types"

[file_types.object]
extension = ".cbo"
magic = "CBO1"
magic_bytes = [0x43, 0x42, 0x4F, 0x31]
description = "Compiled object file - single compilation unit"

[file_types.library]
extension = ".clb"
magic = "CLB1"
magic_bytes = [0x43, 0x4C, 0x42, 0x31]
description = "Executable library - collection of modules"

[file_types.executable]
extension = ".cbr"
magic = "CBR1"
magic_bytes = [0x43, 0x42, 0x52, 0x31]
description = "Mainline application - executable with entry point"

# =============================================================================
# Module Header (32 bytes)
# =============================================================================

[header]
size = 32
description = "Fixed-size header at the start of every module"

[header.fields.magic]
offset = 0
size = 4
type = "u8[4]"
description = "Magic number identifying file type"

[header.fields.version_major]
offset = 4
size = 2
type = "u16"
description = "Major version of bytecode format"
current_value = 0

[header.fields.version_minor]
offset = 6
size = 2
type = "u16"
description = "Minor version of bytecode format"
current_value = 1

[header.fields.flags]
offset = 8
size = 4
type = "ModuleFlags"
description = "Module capability flags (packed struct)"

[header.fields.section_count]
offset = 12
size = 4
type = "u32"
description = "Number of sections in the module"

[header.fields.entry_point]
offset = 16
size = 4
type = "u32"
description = "Routine index for entry point (0xFFFFFFFF if library)"
library_sentinel = 0xFFFFFFFF

[header.fields.source_hash]
offset = 20
size = 4
type = "u32"
description = "Hash of source file for incremental compilation"

[header.fields.reserved]
offset = 24
size = 8
type = "u8[8]"
description = "Reserved for future use"

# =============================================================================
# Module Flags
# =============================================================================

[module_flags]
size = 4
description = "Packed struct indicating module capabilities"

[module_flags.bits]
has_debug_info = { bit = 0, description = "Contains debug information (line tables, locals)" }
has_native_extensions = { bit = 1, description = "Uses native function extensions" }
requires_isam = { bit = 2, description = "Requires ISAM database support" }
is_library = { bit = 3, description = "Module is a library (no entry point)" }
# bits 4-31 reserved

# =============================================================================
# Section Types
# =============================================================================

[sections]
description = "Sections contain different types of module data"

[sections.types.constants]
code = 0x0001
description = "Constant pool - literals, identifiers, references"

[sections.types.types]
code = 0x0002
description = "Type definitions - records, groups, aliases"

[sections.types.routines]
code = 0x0003
description = "Routine definitions - functions, subroutines, methods"

[sections.types.code]
code = 0x0004
description = "Bytecode instructions"

[sections.types.exports]
code = 0x0005
description = "Exported symbols visible to other modules"

[sections.types.imports]
code = 0x0006
description = "External dependencies required by this module"

[sections.types.debug]
code = 0x0007
description = "Debug information - line tables, local variable names"

[sections.types.native]
code = 0x0008
description = "Native function binding declarations"

# =============================================================================
# Section Table Entry (16 bytes)
# =============================================================================

[section_entry]
size = 16
description = "Entry in the section table after the header"

[section_entry.fields.section_type]
offset = 0
size = 4
type = "u32"
description = "Section type code"

[section_entry.fields.offset]
offset = 4
size = 4
type = "u32"
description = "Byte offset from start of file"

[section_entry.fields.size]
offset = 8
size = 4
type = "u32"
description = "Size of section in bytes"

[section_entry.fields.entry_count]
offset = 12
size = 4
type = "u32"
description = "Number of entries in section"

# =============================================================================
# Constant Pool
# =============================================================================

[constants]
description = "The constant pool stores all literal values and identifiers"

[constants.tags]
integer = { code = 0x01, description = "64-bit signed integer" }
decimal = { code = 0x02, description = "Fixed-point decimal (i64 value + u8 precision)" }
string = { code = 0x03, description = "Variable-length UTF-8 string" }
fixed_string = { code = 0x04, description = "Fixed-size space-padded string" }
identifier = { code = 0x05, description = "Symbol name (variable, routine, type)" }
record_ref = { code = 0x06, description = "Reference to type definition" }
routine_ref = { code = 0x07, description = "Reference to routine definition" }

[constants.formats.integer]
description = "i64 in little-endian"
layout = [
    { field = "tag", size = 1, type = "u8", value = 0x01 },
    { field = "value", size = 8, type = "i64" }
]

[constants.formats.decimal]
description = "Fixed-point decimal with precision"
layout = [
    { field = "tag", size = 1, type = "u8", value = 0x02 },
    { field = "value", size = 8, type = "i64", description = "Scaled integer value" },
    { field = "precision", size = 1, type = "u8", description = "Decimal places (0-18)" }
]

[constants.formats.string]
description = "Length-prefixed UTF-8 string"
layout = [
    { field = "tag", size = 1, type = "u8", value = 0x03 },
    { field = "length", size = 4, type = "u32" },
    { field = "data", size = "length", type = "u8[]" }
]

[constants.formats.fixed_string]
description = "Fixed-size space-padded string"
layout = [
    { field = "tag", size = 1, type = "u8", value = 0x04 },
    { field = "size", size = 2, type = "u16", description = "Declared size" },
    { field = "data", size = "size", type = "u8[]" }
]

[constants.formats.identifier]
description = "Symbol name"
layout = [
    { field = "tag", size = 1, type = "u8", value = 0x05 },
    { field = "length", size = 4, type = "u32" },
    { field = "data", size = "length", type = "u8[]" }
]

[constants.formats.record_ref]
description = "Reference to type by index"
layout = [
    { field = "tag", size = 1, type = "u8", value = 0x06 },
    { field = "index", size = 2, type = "u16" }
]

[constants.formats.routine_ref]
description = "Reference to routine by index"
layout = [
    { field = "tag", size = 1, type = "u8", value = 0x07 },
    { field = "index", size = 2, type = "u16" }
]

# =============================================================================
# Data Type Codes
# =============================================================================

[data_types]
description = "Type codes used in fields, parameters, and locals"

[data_types.codes]
string = { code = 0x01, description = "Variable-length string" }
decimal = { code = 0x02, description = "Fixed-point decimal" }
fixed_point = { code = 0x03, description = "DBL implied decimal (d, d.)" }
int8 = { code = 0x04, description = "8-bit signed integer (i1)" }
int16 = { code = 0x05, description = "16-bit signed integer (i2)" }
int32 = { code = 0x06, description = "32-bit signed integer (i4)" }
int64 = { code = 0x07, description = "64-bit signed integer (i8)" }
structure = { code = 0x08, description = "Composite record type" }
handle = { code = 0x09, description = "Opaque handle (file, object, etc.)" }
group = { code = 0x0A, description = "Named group within a record" }

# =============================================================================
# Type Definitions
# =============================================================================

[type_def]
description = "Record, group, or alias type definition"

[type_def.fields]
type_id = { size = 2, type = "u16", description = "Unique type identifier" }
kind = { size = 1, type = "TypeKind", description = "Type category" }
flags = { size = 1, type = "u8", description = "Type modifier flags" }
name_index = { size = 2, type = "u16", description = "Constant pool index of name" }
total_size = { size = 4, type = "u32", description = "Total byte size of type" }
field_count = { size = 2, type = "u16", description = "Number of fields" }
# followed by field_count FieldDef entries

[type_def.kinds]
record = { code = 0, description = "Record/struct type" }
group = { code = 1, description = "Named group (overlay)" }
alias = { code = 2, description = "Type alias" }

# =============================================================================
# Field Definition
# =============================================================================

[field_def]
description = "Field within a type definition"

[field_def.fields]
name_index = { size = 2, type = "u16", description = "Constant pool index of name" }
data_type = { size = 1, type = "DataTypeCode", description = "Field type" }
flags = { size = 1, type = "u8", description = "Field modifier flags" }
offset = { size = 2, type = "u16", description = "Byte offset within record" }
size = { size = 2, type = "u16", description = "Field size in bytes" }
precision = { size = 1, type = "u8", description = "Decimal precision (0 if N/A)" }
# Note: array_dims not serialized in current version

# =============================================================================
# Routine Definition
# =============================================================================

[routine_def]
description = "Function or subroutine definition"

[routine_def.fields]
name_index = { size = 2, type = "u16", description = "Constant pool index of name" }
flags = { size = 2, type = "RoutineFlags", description = "Routine capability flags" }
code_offset = { size = 4, type = "u32", description = "Byte offset into code section" }
code_length = { size = 4, type = "u32", description = "Length of bytecode" }
param_count = { size = 2, type = "u16", description = "Number of parameters" }
local_count = { size = 2, type = "u16", description = "Number of local variables" }
max_stack = { size = 2, type = "u16", description = "Maximum stack depth" }
# followed by params and locals

[routine_def.flags]
is_public = { bit = 0, description = "Exported to other modules" }
is_function = { bit = 1, description = "Has return value" }
is_void = { bit = 2, description = "No return value (void)" }
has_varargs = { bit = 3, description = "Accepts variable arguments" }
is_entry_point = { bit = 4, description = "Module entry point" }
# bits 5-15 reserved

# =============================================================================
# Parameter Definition
# =============================================================================

[param_def]
description = "Function/subroutine parameter"

[param_def.fields]
name_index = { size = 2, type = "u16", description = "Constant pool index of name" }
data_type = { size = 1, type = "DataTypeCode", description = "Parameter type" }
mode = { size = 1, type = "ParamMode", description = "Pass by value or reference" }
default_value = { size = 2, type = "u16", description = "Constant pool index (0xFFFF if none)" }

[param_def.modes]
val = { code = 0, description = "Pass by value (default for Cot)" }
ref = { code = 1, description = "Pass by reference (default for DBL)" }

# =============================================================================
# Local Variable Definition (Debug Info)
# =============================================================================

[local_def]
description = "Local variable debug information"

[local_def.fields]
name_index = { size = 2, type = "u16", description = "Constant pool index of name" }
slot = { size = 2, type = "u16", description = "Stack slot index" }
data_type = { size = 1, type = "DataTypeCode", description = "Variable type" }

# =============================================================================
# Export Entry
# =============================================================================

[export_entry]
description = "Symbol exported to other modules"

[export_entry.fields]
name_index = { size = 2, type = "u16", description = "Constant pool index of name" }
kind = { size = 1, type = "ExportKind", description = "Export category" }
flags = { size = 1, type = "u8", description = "Export modifier flags" }
index = { size = 2, type = "u16", description = "Index into appropriate table" }

[export_entry.kinds]
routine = { code = 0, description = "Exported function/subroutine" }
record = { code = 1, description = "Exported type definition" }
global = { code = 2, description = "Exported global variable" }

# =============================================================================
# Import Entry
# =============================================================================

[import_entry]
description = "External dependency required by module"

[import_entry.fields]
name_index = { size = 2, type = "u16", description = "Constant pool index of name" }
module_index = { size = 2, type = "u16", description = "Source module (0 = any)" }
kind = { size = 1, type = "ImportKind", description = "Import category" }
flags = { size = 1, type = "ImportFlags", description = "Import modifier flags" }

[import_entry.kinds]
routine = { code = 0, description = "Imported function/subroutine" }
record = { code = 1, description = "Imported type definition" }
global = { code = 2, description = "Imported global variable" }

[import_entry.flags]
required = { bit = 0, description = "Import must be resolved (error if missing)" }
# bits 1-7 reserved

# =============================================================================
# Debug Section
# =============================================================================

[debug]
description = "Optional debug information for development and debugging"

[debug.line_entry]
description = "Maps bytecode offset to source location"

[debug.line_entry.fields]
code_offset = { size = 4, type = "u32", description = "Bytecode offset" }
line = { size = 2, type = "u16", description = "Source line number" }
column = { size = 2, type = "u16", description = "Source column number" }

[debug.local_var_entry]
description = "Extended local variable scope information"

[debug.local_var_entry.fields]
name_index = { size = 2, type = "u16", description = "Constant pool index of name" }
slot = { size = 2, type = "u16", description = "Stack slot" }
scope_start = { size = 4, type = "u32", description = "Bytecode offset where var becomes active" }
scope_end = { size = 4, type = "u32", description = "Bytecode offset where var goes out of scope" }
data_type = { size = 1, type = "DataTypeCode", description = "Variable type" }

# =============================================================================
# Library Format
# =============================================================================

[library]
description = "Library bundle containing multiple modules"

[library.header]
magic = "CLB1"
description = "Library files contain a master export table and embedded modules"

[library.master_export]
description = "Unified export entry spanning modules"

[library.master_export.fields]
name_index = { size = 2, type = "u16", description = "Constant pool index" }
module_index = { size = 2, type = "u16", description = "Which embedded module" }
local_index = { size = 2, type = "u16", description = "Index within that module" }

# =============================================================================
# Binary Layout Summary
# =============================================================================

[layout]
description = "Overall file structure"
structure = """
+----------------------+
| ModuleHeader (32B)   |
+----------------------+
| Section Table        |
| (16B × section_count)|
+----------------------+
| Constants Section    |
+----------------------+
| Types Section        |
+----------------------+
| Routines Section     |
+----------------------+
| Code Section         |
+----------------------+
| Exports Section      |
+----------------------+
| Imports Section      |
+----------------------+
| Debug Section (opt)  |
+----------------------+
| Native Section (opt) |
+----------------------+
"""
