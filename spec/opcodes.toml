description = "Write to stdout with newline"
since = "1.0.0"

[opcodes.println.encoding]
format = "reg_argc"
size = 2
operands = [
    { name = "rs", bits = "7:4", type = "register" },
    { name = "argc", bits = "3:0", type = "immediate", range = [0, 15] },
]

[opcodes.println.semantics]
operation = "print registers rs through rs+argc-1 to stdout, then newline"
stack_effect = 0
io = "stdout"

