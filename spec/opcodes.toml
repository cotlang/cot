# Cot Bytecode Opcodes Specification
#
# Register-based instruction set for the Cot virtual machine.
# All operations use 16 virtual registers (r0-r15).
#
# Register Conventions:
#   r0-r7:   General purpose, caller-saved, function arguments
#   r8-r13:  General purpose, callee-saved
#   r14:     Frame pointer (reserved)
#   r15:     Return value

[meta]
version = "1.0.0"
total_opcodes = 256
description = "Cot VM bytecode instruction set"

[registers]
count = 16
argument_registers = ["r0", "r1", "r2", "r3", "r4", "r5", "r6", "r7"]
caller_saved = ["r0", "r1", "r2", "r3", "r4", "r5", "r6", "r7"]
callee_saved = ["r8", "r9", "r10", "r11", "r12", "r13"]
frame_pointer = "r14"
return_value = "r15"

# =============================================================================
# Core Operations (0x00-0x0F)
# =============================================================================

[opcodes.nop]
code = 0x00
mnemonic = "nop"
description = "No operation"
since = "1.0.0"

[opcodes.nop.encoding]
format = "none"
size = 1

[opcodes.nop.semantics]
operation = "// do nothing"
stack_effect = 0

# -----------------------------------------------------------------------------

[opcodes.halt]
code = 0x01
mnemonic = "halt"
description = "Stop execution"
since = "1.0.0"

[opcodes.halt.encoding]
format = "none"
size = 1

[opcodes.halt.semantics]
operation = "return Halted"
stack_effect = 0

# =============================================================================
# Register Moves & Immediates (0x10-0x1F)
# =============================================================================

[opcodes.mov]
code = 0x10
mnemonic = "mov"
description = "Copy value from source register to destination register"
since = "1.0.0"

[opcodes.mov.encoding]
format = "reg_reg"
size = 2
operands = [
    { name = "rd", bits = "7:4", type = "register" },
    { name = "rs", bits = "3:0", type = "register" },
]

[opcodes.mov.semantics]
operation = "rd = rs"
stack_effect = 0

[opcodes.mov.tests]
cases = [
    { setup = { r0 = 42 }, args = { rd = 1, rs = 0 }, expect = { r1 = 42 } },
    { setup = { r5 = -100 }, args = { rd = 0, rs = 5 }, expect = { r0 = -100 } },
]

# -----------------------------------------------------------------------------

[opcodes.movi]
code = 0x11
mnemonic = "movi"
description = "Load 8-bit signed immediate into register"
since = "1.0.0"

[opcodes.movi.encoding]
format = "reg_imm8"
size = 2
operands = [
    { name = "rd", bits = "7:4", type = "register" },
    { name = "imm8", bits = "15:8", type = "immediate", range = [-128, 127] },
]

[opcodes.movi.semantics]
operation = "rd = sign_extend(imm8)"
stack_effect = 0

[opcodes.movi.tests]
cases = [
    { args = { rd = 0, imm8 = 42 }, expect = { r0 = 42 } },
    { args = { rd = 1, imm8 = -1 }, expect = { r1 = -1 } },
]

# -----------------------------------------------------------------------------

