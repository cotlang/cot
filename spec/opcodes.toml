code = 0x12
mnemonic = "movi16"
description = "Load 16-bit signed immediate into register"
since = "1.0.0"

[opcodes.movi16.encoding]
format = "reg_imm16"
size = 3
operands = [
    { name = "rd", bits = "7:4", type = "register" },
    { name = "imm16", bits = "23:8", type = "immediate", range = [-32768, 32767] },
]

[opcodes.movi16.semantics]
operation = "rd = sign_extend(imm16)"
stack_effect = 0

# -----------------------------------------------------------------------------

