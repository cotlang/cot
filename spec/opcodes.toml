[opcodes.add]
code = 0x30
mnemonic = "add"
description = "Add two registers"
since = "1.0.0"

[opcodes.add.encoding]
format = "reg_reg_reg"
size = 2
operands = [
    { name = "rd", bits = "7:4", type = "register" },
    { name = "rs1", bits = "3:0", type = "register" },
    { name = "rs2", bits = "15:12", type = "register" },
]

[opcodes.add.semantics]
operation = "rd = rs1 + rs2"
stack_effect = 0
type_dispatch = true

[opcodes.add.type_behavior]
int_int = "integer addition, overflow wraps"
dec_dec = "decimal addition with precision promotion"
str_str = "string concatenation"

[opcodes.add.tests]
cases = [
    { setup = { r0 = 10, r1 = 20 }, args = { rd = 2, rs1 = 0, rs2 = 1 }, expect = { r2 = 30 } },
    { setup = { r0 = -5, r1 = 3 }, args = { rd = 0, rs1 = 0, rs2 = 1 }, expect = { r0 = -2 } },
]

