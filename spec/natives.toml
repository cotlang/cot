# Cot Native Functions Specification
#
# This file is the single source of truth for native function signatures.
# Code generators use this to produce:
#   - Zig native function stubs
#   - Rust native function stubs
#   - Conformance tests for both runtimes
#   - API documentation
#
# Namespace Design:
#   - Cot (.cot): Requires explicit import (e.g., `import std.math`)
#   - Cot Prelude: Functions with `prelude = true` available without import
#   - DBL (.dbl): All functions available implicitly (backward compatibility)

[meta]
version = "1.0.0"
description = "Cot standard library native functions"

# =============================================================================
# PRELUDE FUNCTIONS
# Available without import in .cot files
# =============================================================================

[functions.print]
namespace = "std.io"
description = "Write values to stdout without newline"
since = "1.0.0"
prelude = true

[functions.print.signature]
params = [
    { name = "args", type = "variadic", element_type = "any" }
]
returns = "void"

[functions.print.behavior]
pure = false
throws = false
io = "stdout"

# -----------------------------------------------------------------------------

[functions.println]
namespace = "std.io"
description = "Write values to stdout with newline"
since = "1.0.0"
prelude = true

[functions.println.signature]
params = [
    { name = "args", type = "variadic", element_type = "any" }
]
returns = "void"

[functions.println.behavior]
pure = false
throws = false
io = "stdout"

# -----------------------------------------------------------------------------

[functions.assert]
namespace = "std.debug"
description = "Assert condition is true, halt if false"
since = "1.0.0"
prelude = true

[functions.assert.signature]
params = [
    { name = "condition", type = "bool" }
]
returns = "void"

[functions.assert.behavior]
pure = false
throws = true
errors = ["AssertionFailed"]

